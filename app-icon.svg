    <circle r="368" opacity="0.35" stroke-width="46" />
    <circle r="245" opacity="0.65" stroke-width="46" />
    <circle r="102" stroke-width="46" />
    <circle r="33" fill="#FFB340" stroke="none" />
  </g>
</svg>
