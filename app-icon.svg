<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <title>Mimisbrunnr Logo - Black Background</title>
  <!-- Background -->
  <rect width="1024" height="1024" fill="black" />

  <!-- Logo centered with ~10% padding on each side (artwork within ~819px, centered at 512,512) -->
